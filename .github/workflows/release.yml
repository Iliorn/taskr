name: Release

# Push a version tag to cut a release:
#   git tag v1.10.0 && git push origin v1.10.0
# This builds the Linux and Windows targets with the tag baked in as the version and
# publishes them as a GitHub release. Asset names are load-bearing — the
# in-app self-update fetches these exact names; do not rename them.
# macOS is distributed from tagged source through Homebrew, not release assets.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release binaries
        # `-s -w` strips the symbol table and DWARF debug info, cutting
        # ~30% off each release binary with no functional change. Local
        # `go build .` (used during development) does NOT pass these flags
        # so `dlv` and rich panic stack traces stay available there.
        env:
          LDFLAGS: -s -w -X main.appVersion=${{ github.ref_name }}
        run: |
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o taskr .
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o taskr.exe .

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ github.ref_name }}
        run: |
          gh release create "$V" --title "$V" --generate-notes \
            taskr taskr.exe
